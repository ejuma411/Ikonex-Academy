{% extends 'base/base.html' %}

{% block content %}

<div class="d-flex justify-content-between">
    <h3>Scores</h3>
    <a href="{% url 'score_create' %}" class="btn btn-primary">Add Score</a>
</div>

<table class="table table-bordered mt-3">
    <tr>
        <th>Student</th>
        <th>Subject</th>
        <th>Assessment</th>
        <th>Marks</th>
    </tr>

    {% for s in scores %}
    <tr>
        <td>{{ s.student.first_name }} {{ s.student.last_name }}</td>
        <td>{{ s.subject.name }}</td>
        <td>{{ s.assessment.name }}</td>
        <td>{{ s.marks }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
