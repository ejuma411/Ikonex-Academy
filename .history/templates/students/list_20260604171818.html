{% extends 'base/base.html' %}

{% block content %}

<div class="d-flex justify-content-between mb-3">
    <h3>Students</h3>
    <a href="{% url 'student_create' %}" class="btn btn-primary">Add Student</a>
</div>

<table class="table table-bordered">
    <tr>
        <th>Admission No</th>
        <th>Name</th>
        <th>Class</th>
        <th>Actions</th>
    </tr>

    {% for s in students %}
    <tr>
        <td>{{ s.admission_no }}</td>
        <td>{{ s.first_name }} {{ s.last_name }}</td>
        <td>{{ s.class_stream.name }}</td>
        <td>
            <a href="{% url 'student_detail' s.id %}">View</a> |
            <a href="{% url 'student_update' s.id %}">Edit</a> |
            <a href="{% url 'student_delete' s.id %}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
