{% extends 'base/base.html' %}

{% block content %}

<h2>{{ student.first_name }} {{ student.last_name }}</h2>

<p><strong>Total:</strong> {{ total }}</p>
<p><strong>Average:</strong> {{ average }}</p>

<table class="table table-bordered mt-3">
    <tr>
        <th>Subject</th>
        <th>Assessment</th>
        <th>Marks</th>
        <th>Grade</th>
    </tr>

    {% for s in scores %}
    <tr>
        <td>{{ s.subject }}</td>
        <td>{{ s.assessment }}</td>
        <td>{{ s.marks }}</td>
        <td>{{ s.grade }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
