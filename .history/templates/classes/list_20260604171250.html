{% extends 'base/base.html' %}

{% block content %}

<div class="d-flex justify-content-between mb-3">
    <h3>Class Streams</h3>
    <a href="{% url 'class_create' %}" class="btn btn-primary">Add Class</a>
</div>

<table class="table table-bordered">
    <tr>
        <th>Name</th>
        <th>Actions</th>
    </tr>

    {% for c in classes %}
    <tr>
        <td>{{ c.name }}</td>
        <td>
            <a href="{% url 'class_detail' c.id %}">View</a> |
            <a href="{% url 'class_update' c.id %}">Edit</a> |
            <a href="{% url 'class_delete' c.id %}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
