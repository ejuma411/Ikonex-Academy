{% extends 'base/base.html' %}

{% block content %}

<h3>{{ class_stream.name }}</h3>

<hr>

<h5>Students in this class</h5>

<ul>
    {% for student in students %}
        <li>{{ student.first_name }} {{ student.last_name }}</li>
    {% empty %}
        <li>No students yet</li>
    {% endfor %}
</ul>

{% endblock %}
