{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>
        {% block title %}
        Ikonex Academy SMS
        {% endblock %}
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="icon" type="image/png" href="{% static 'images/ikonex.png' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="app-body">

<div class="container-fluid app-shell">
    <div class="row g-0 min-vh-100">
        <div class="col-md-2 app-sidebar-col p-0 d-none d-md-block">
            {% include 'base/sidebar.html' %}
        </div>

        <div class="col-12 col-md-10 app-main-col p-0">
            {% include 'base/navbar.html' %}

            <main class="app-main p-4 p-lg-5">
                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>
</div>

<div class="offcanvas offcanvas-start app-mobile-sidebar" tabindex="-1" id="mobileSidebar" aria-labelledby="mobileSidebarLabel">
    <div class="offcanvas-header">
        <div class="d-flex align-items-center gap-3" id="mobileSidebarLabel">
            <div class="navbar-logo-card">
                <img src="{% static 'images/ikonex.png' %}" alt="Ikonex Academy logo" class="navbar-logo">
            </div>
            <div>
                <div class="app-navbar-brand">Ikonex Academy</div>
                <div class="navbar-subtitle">Student Management System</div>
            </div>
        </div>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body pt-0">
        {% include 'base/sidebar_links.html' %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
