{% load static %}

<nav class="app-navbar">

    <!-- Mobile toggle -->
    <button class="app-sidebar-toggle d-md-none"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#mobileSidebar"
            aria-controls="mobileSidebar"
            aria-label="Open navigation">
        <i class="bi bi-list"></i>
    </button>

    <!-- Brand (desktop) -->
    <div class="d-none d-md-flex align-items-center gap-2">
        <div class="app-navbar-copy">
            <span class="app-navbar-brand">Student Management System</span>
            <div class="navbar-subtitle">Ikonex Academy</div>
        </div>
    </div>

    <!-- User info -->
    <div class="navbar-user">
        <span class="navbar-user-label d-none d-sm-inline">
            {{ request.user.username }}
            {% if request.user.is_superuser %}
                <small class="text-muted ms-1">(Admin)</small>
            {% else %}
                <small class="text-muted ms-1">(Staff)</small>
            {% endif %}
        </span>
        <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
        </a>
    </div>

</nav>
