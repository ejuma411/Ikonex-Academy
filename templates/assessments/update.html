{% extends 'base/base.html' %}

{% block title %}Edit Assessment | Ikonex Academy{% endblock %}

{% block content %}

<div class="page-header">
    <div>
        <h1 class="page-title">Edit Assessment</h1>
        <p class="page-subtitle">Update assessment details below.</p>
    </div>
    <a href="{% url 'assessment_list' %}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i> Back
    </a>
</div>

<div class="form-card">
    {% if form.non_field_errors %}
        <div class="alert alert-danger mb-3">{{ form.non_field_errors }}</div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg me-1"></i> Update Assessment
            </button>
            <a href="{% url 'assessment_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
