{% extends 'base/base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-start">
    <div>
        <h3>Score Details</h3>
        <p class="mb-1"><strong>Student:</strong> {{ score.student.first_name }} {{ score.student.last_name }}</p>
        <p class="mb-1"><strong>Subject:</strong> {{ score.subject.name }}</p>
        <p class="mb-1"><strong>Assessment:</strong> {{ score.assessment.name }}</p>
        <p class="mb-1"><strong>Marks:</strong> {{ score.marks }}</p>
    </div>
    <div>
        <a href="{% url 'score_update' score.id %}" class="btn btn-outline-primary">Edit</a>
        <a href="{% url 'score_delete' score.id %}" class="btn btn-outline-danger">Delete</a>
    </div>
</div>

{% endblock %}
