{% extends 'base/base.html' %}

{% block title %}Delete Assessment | Ikonex Academy{% endblock %}

{% block content %}

<div class="page-header">
    <h1 class="page-title">Delete Assessment</h1>
    <a href="{% url 'assessment_list' %}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i> Back
    </a>
</div>

<div class="danger-card">
    <div class="danger-icon">
        <i class="bi bi-exclamation-triangle-fill"></i>
    </div>
    <h5 class="fw-700 mb-2">Are you sure?</h5>
    <p class="text-muted mb-4">
        You are about to permanently delete
        <strong>{{ assessment.name }}</strong>.
        All associated scores will also be removed.
    </p>
    <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">
                <i class="bi bi-trash me-1"></i> Yes, Delete
            </button>
            <a href="{% url 'assessment_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
