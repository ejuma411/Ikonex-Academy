{% extends 'base/base.html' %}

{% block content %}

<h3>Delete Assessment</h3>

<p>Are you sure you want to delete <strong>{{ assessment.name }}</strong>?</p>

<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'assessment_list' %}" class="btn btn-outline-secondary">Cancel</a>
</form>

{% endblock %}
