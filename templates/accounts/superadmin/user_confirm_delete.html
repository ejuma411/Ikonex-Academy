{% extends 'base/base.html' %}
{% load static %}

{% block title %}Delete User{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-5">
    <div class="text-center" style="max-width: 500px; margin: 0 auto;">
        <div class="mb-4">
            <i class="bi bi-exclamation-triangle-fill" style="font-size: 4rem; color: #dc2626;"></i>
        </div>
        <h2 class="h3 mb-3">Delete User</h2>
        <p class="text-muted mb-4">
            Are you sure you want to delete <strong>{{ user.get_full_name|default:user.username }}</strong>?
            This action cannot be undone.
        </p>
        
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-3 justify-content-center">
                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-trash"></i> Yes, Delete
                </button>
                <a href="{% url 'user_detail' user.id %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
