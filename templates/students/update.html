{% extends 'base/base.html' %}

{% block title %}Update Student | Ikonex Academy{% endblock %}

{% block content %}

<div class="page-header">
    <div>
        <h1 class="page-title">Update Student</h1>
        <p class="page-subtitle">Edit student information below.</p>
    </div>
    <a href="{% url 'student_list' %}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i> Back
    </a>
</div>

<div class="form-card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg me-1"></i> Update Student
            </button>
            <a href="{% url 'student_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
