services:
  - type: web
    name: ikonex-academy
    runtime: python
    repo: https://github.com/yourusername/ikonex-academy.git
    plan: free
    region: frankfurt
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ikonex-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://ikonex-academy.onrender.com

databases:
  - name: ikonex-db
    databaseName: ikonex
    user: ikonex_user
    plan: free